<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Generator - Upload</title>
    <style>
        :root {
            --bg: #f4f7f5;
            --card: #ffffff;
            --text: #1e2930;
            --accent: #0b7a75;
            --accent-dark: #075754;
            --border: #d9e2df;
            --warn: #8b1e3f;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: radial-gradient(circle at top right, #d8f4ef 0%, var(--bg) 50%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1rem;
        }
        .card {
            width: min(680px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 18px 30px rgba(11, 122, 117, 0.12);
            padding: 2rem;
            animation: slideIn 0.45s ease-out;
        }
        h1 { margin-top: 0; font-size: 1.9rem; }
        p { line-height: 1.6; }
        .error {
            background: #ffe8ee;
            color: var(--warn);
            border: 1px solid #f8c8d6;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .field {
            margin-bottom: 1rem;
        }
        .field input[type="file"] {
            display: block;
            width: 100%;
            border: 1px dashed var(--border);
            background: #f9fcfb;
            border-radius: 10px;
            padding: 0.9rem;
        }
        button {
            border: none;
            background: var(--accent);
            color: #fff;
            border-radius: 10px;
            padding: 0.75rem 1.2rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover { background: var(--accent-dark); }
        button[disabled] { opacity: 0.7; cursor: wait; }
        .hint { color: #526067; margin-top: 0.5rem; font-size: 0.95rem; }
        .loading { display: none; margin-top: 0.75rem; color: var(--accent-dark); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Note Generator</h1>
        <p>Upload a PDF or image file to extract text and create notes.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" enctype="multipart/form-data" id="uploadForm">
            {% csrf_token %}
            <div class="field">
                {{ form.file }}
                <div class="hint">{{ form.file.help_text }}</div>
            </div>
            <button type="submit" id="submitBtn">Generate Notes</button>
            <div class="loading" id="loadingText">Processing file, please wait...</div>
        </form>
    </main>

    <script>
        const form = document.getElementById('uploadForm');
        const button = document.getElementById('submitBtn');
        const loading = document.getElementById('loadingText');

        form.addEventListener('submit', () => {
            button.disabled = true;
            button.textContent = 'Processing...';
            loading.style.display = 'block';
        });
    </script>
</body>
</html>
